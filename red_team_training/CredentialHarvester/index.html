  <style>
    /* By default, hide features for javascript-disabled browsing */
    /* We use !important to override any css with higher specificity */
    /* It is also overriden by the styles in <noscript> in the header file */
    .no-js {
      clip: rect(0 0 0 0);
      clip-path: inset(50%);
      height: 1px;
      overflow: hidden;
      position: absolute;
      white-space: nowrap;
      width: 1px;
    }
  </style>
  <noscript>
    <style>
      /* We use !important to override the default for js enabled */
      /* If the display should be other than block, it should be defined specifically here */
      .js-required {
        display: none !important;
      }

      .no-js {
        clip: auto;
        clip-path: none;
        height: auto;
        overflow: auto;
        position: static;
        white-space: normal;
        width: var(--prompt-width);
      }
    </style>
  </noscript>

  <style>
    @font-face {
      font-family: "TT Norms";
      src: url("fonts/ttnorms_regular.woff") format('woff'), url("fonts/ttnorms_regular.woff2") format('woff2');
      font-display: swap;
      font-weight: 400;
      font-style: normal;
    }

    /*!sc*/
    @font-face {
      font-family: "TT Norms";
      src: url("fonts/ttnorms_medium.woff") format('woff'), url("fonts/ttnorms_medium.woff2") format('woff2');
      font-display: swap;
      font-weight: 500;
      font-style: normal;
    }

    /*!sc*/
    @font-face {
      font-family: "TT Norms";
      src: url("fonts/ttnorms_bold.woff") format('woff'), url("fonts/ttnorms_bold.woff2") format('woff2');

    @media (max-width: 866000px) {

        display: flex;

    .main-box {
      --prompt-min-height: auto;
      display: flex;
      flex-direction: column;
      height: auto;
      white-space: normal;
      border-radius: 5px;
      border-radius: var(--border-radius-outer);
      grid-area: center;
      position: relative;
      width: 400px;
      width: var(--prompt-width);

    }

    /* OLD STYLES */
    /* When we can update our terraform provider these old style root rules would be better moved to the branding theme configuration. */
    :root {
      --action-primary-color: #007D99 !important;
      --input-border-radius: 6px !important;
      --border-radius-component: 6px !important;
      --gray-dark: #717171 !important;
      --button-border-radius: 6px !important;
      --border-radius-outer: 16px !important;
      --prompt-min-height: 30px !important;
      --page-background-color: #00A2C7 !important;
      --spacing-5: calc(var(--spacing)*4.2) !important;
      --spacing-3: calc(var(--spacing)*2.7) !important;
      --secondary-button-border-color: #007D99 !important;
      --secondary-button-text-color: #007D99 !important;
      --header-post-login-display: none;
      --footer-post-login-height: 58px;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      --page-background-color: #00A2C7 !important;

    }

    body {
      --page-background-color: #FAF8F5;
      display: flex;
      flex-direction: column;
    }

    .header-post-login {
      border-bottom: 1px solid rgb(231, 231, 231);
      padding-left: 1rem;
    }

    .header-sub-box {
      height: 24%;
    }

    .header-nav {
      -webkit-box-align: center;
      align-items: center;
      display: flex;
      height: 3rem;
      max-width: 73rem;
      margin: 0px auto;
      position: relative;
    }

    body._hide-prompt-logo h1 {
      margin-bottom: 2px;
    }

    .header {
      height: 24%;
      display: flex;
      flex-direction: column-reverse;
      margin: 0;
    }

    .header .logo {
      display: flex;
      justify-content: center;
    }

    .header .logo img {
      width: 118px;
      margin-bottom: 12px;
    }

    .header .logo a {
      position: relative;
      left: 2px;
    }

    .footer {
      position: relative;
      /* Use a high z-index for future-proofing */
      z-index: 10;
      min-height: 110px;
      margin: 0;
    }

    button[type="submit"] {
      margin-top: 20px !important;
      font-weight: 700;
    }

    ._widget-auto-layout ._widget {
      min-height: 30vh;
      padding: 6px 0;

    }

    ._widget section>div {
      min-height: 50px !important;
    }

    .center a {
      font-weight: 400 !important;
      color: var(--action-primary-color) !important;
      font-size: 16px !important;
    }

    body._hide-prompt-logo h1 {
      margin-bottom: 16px;
    }

    .sofi-links {
      display: flex;
      justify-content: center;
      margin-bottom: 24px;
      margin-top: 24px;
    }

    .sofi-links a {
      display: flex;
      justify-content: center;
      margin-bottom: 12px;
      color: white;
      margin: 0px 24px;
      font-size: 16px !important;
      font-weight: 700;
      color: white;
      margin: 0px 24px;
      line-height: 24px;
    }

    .input-wrapper:last-child {
      padding-bottom: 0px !important;
    }

    .input-wrapper:not(:last-child) {
      padding-bottom: 8px !important;
    }

    form p {
      margin-top: 18px !important;

    }

    form p a {
      font-size: 16px !important;
      font-weight: 400 !important;
    }

    #widget_block {
      min-height: 76%;
      margin-top: 0;
      flex: 1 0 auto;
      margin-bottom: -24px;
    }

    @media screen and (max-height:800px) {
      .header {
        height: 15%;
      }
      #widget_block {
        min-height: 85%
      }
    }
  </style>
</head>

  <script>
    document.querySelectorAll('.input').forEach(input => {
        input.addEventListener('focus', function () {
            this.parentElement.classList.add('focus');
        });
        input.addEventListener('blur', function () {
            if (this.value !== '') {
                this.parentElement.classList.add('c457439c5'); // Indicate the field is filled
            } else {
                this.parentElement.classList.remove('c457439c5'); // Remove if empty
            }
            this.parentElement.classList.remove('focus'); // Always remove focus state on blur
        });
    });
  </script>
